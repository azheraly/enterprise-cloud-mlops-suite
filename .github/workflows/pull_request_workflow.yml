name: Pull Request Workflow
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true



# Each branch has its own queue
# Only one run per branch at a time
# New push → cancels previous run on that branch
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: python version
        run: python --version

      - name: show files in the repository
        run: ls
      
      - name: save code
        uses: actions/upload-artifact@v4
        with:
          name: mycode
          path: segemaker/*
          if-no-files-found: error

          # run compose action
      - name: run compose action
        uses: ./.github/actions/my-action
        with:
          python-version: '3.12'


  dev:
    needs: build
    uses: ./.github/workflows/reuseable_workflow.yml
    with:
      environment: dev
    secrets: inherit

  staging:
    needs: 
        - dev
    uses: ./.github/workflows/reuseable_workflow.yml
    with:
      environment: staging
    secrets: inherit  

  production:
    needs: 
        - staging
    uses: ./.github/workflows/reuseable_workflow.yml
    with:
      environment: production
    secrets: inherit