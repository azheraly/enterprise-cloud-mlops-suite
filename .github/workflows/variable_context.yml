# in this workflow, we will set some variables and use them in the next steps
name: Variable Context Example
on:
  workflow_dispatch:
    inputs:
      my_variable:
        type: string
        default: 'Hello, World!'
        description: 'A variable to demonstrate context passing between steps'

env:
  VAR1: "Variable 1 Global Value"
  VAR2: "Variable 2 Global Value"
  VAR3: "Variable 3 Global Value"

jobs:
  job1:
    runs-on: ubuntu-latest
    env: 
      GITHUB_CONTEXT: ${{ toJson(github) }}
    steps:
      - name: Use the variable
        run: echo "${GITHUB_CONTEXT}"

  job2:
    runs-on: ubuntu-latest
    needs: job1
    outputs:
      output1: ${{ steps.step1.outputs.step1value }}
      output2: ${{ steps.step2.outputs.step2value }}
    steps:
      - name: step 1 in job 2
        id: step1
        run: echo "step1value=Hello from Job 2 Step 1" >> $GITHUB_OUTPUT
      - name: step 2 in job 2
        id: step2
        run: echo "step2value=Hello from Job 2 Step 2" >> $GITHUB_OUTPUT


  job3:
    runs-on: ubuntu-latest
    needs: job2
    steps:
      - name: step 1 in job 3
        run: echo "Accessing variables from Job 2 ${{ needs.job2.outputs.output1 }} and ${{ needs.job2.outputs.output2 }}"
      - name: step 2 in job 3
        run: echo "Accessing global variables $VAR1, $VAR2, $VAR3"

  job4:
    runs-on: ubuntu-latest
    needs: job3
    env:
      VAR1: "Variable 1 Local Value for Job 4"
      VAR2: "Variable 2 Local Value for Job 4"
      VAR3: "Variable 3 Local Value for Job 4"

    steps:
      - name: step 1 in job 4
        run: echo "Accessing global variables in Job 4 $VAR1, $VAR2, $VAR3"